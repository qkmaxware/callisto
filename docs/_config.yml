title: Callisto
version: 43
author: https://github.com/qkmaxware
description: >- # this means to ignore newlines until "baseurl:"
  Callisto is a galaxy themed Fedora-based image, designed to be frictionless 
  and enjoyable for most people running modern Intel/AMD systems.
baseurl: "/callisto" # the subpath of your site, e.g. /blog
url: "https://qkmaxware.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
plugins:
  - jekyll-feed

collections_dir: _collections
collections:
  - features
  - versions

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
