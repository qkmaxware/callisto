<h4>Install with <i>rpm-ostree</i>:</h4>
<ol>
    <li>Install any atomic <a href="https://www.fedoraproject.org/atomic-desktops/">Fedora distribution</a> (Kinoite is recommended).</li>
    <li>Run the following command using the terminal.</li>
</ol>
<pre>
    <code>
rpm-ostree rebase ostree-image-signed:docker://ghcr.io/qkmaxware/callisto:{{ version.install-tag }}
    </code>
</pre>
